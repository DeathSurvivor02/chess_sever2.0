name: Build and Deploy Chess Wasm

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Diagnostics (File Structure)
        run: |
          pwd
          ls -R

      - name: Configure and Build (CMake)
        run: |
          mkdir build
          cd build
          emcmake cmake ..
          emmake make -j$(nproc)

      - name: Prepare Deployment
        run: |
          mkdir -p deploy
          cp build/chess_game.html deploy/index.html
          cp build/chess_game.js deploy/index.js
          cp build/chess_game.wasm deploy/index.wasm
          cp build/chess_game.data deploy/index.data || true

      - name: Deploy to Build Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          publish_branch: build
